services:
  mysql:
    image: mysql:8.0
    container_name: posturfit_mysql
    restart: unless-stopped
    command:
      - --innodb_buffer_pool_size=134217728
      - --innodb_log_buffer_size=8388608
      - --innodb_flush_log_at_trx_commit=2
      - --max_connections=20
      - --table_open_cache=200
      - --performance_schema=OFF
      # - --query_cache_type=0
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: posturfit
      MYSQL_USER: ${MYSQL_USER:-posturfit}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # ports:
    #   - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: posturfit_api
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-posturfit}:${MYSQL_PASSWORD}@mysql:3306/posturfit
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}
      SESSION_SECRET: ${SESSION_SECRET}
      MONGO_URI: ${MONGO_URI}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      OTP_EXPIRE_MINUTES: ${OTP_EXPIRE_MINUTES:-10}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    volumes:
      - app_static:/app/static
    mem_limit: 768m
    mem_reservation: 384m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
  app_static:
